services:
  - type: web
    name: beauvia-website
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/beauvia.db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PAYMOB_API_KEY
        sync: false
      - key: PAYMOB_INTEGRATION_ID
        sync: false
      - key: PAYMOB_IFRAME_ID
        sync: false
      - key: PAYMOB_HMAC_SECRET
        sync: false
    disk:
      name: beauvia-data
      mountPath: /data
      sizeGB: 1
