<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag — BEAUVIA&CO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-nude: #EFE6DD;
            --forest-green: #1F3D2B;
            --soft-blush: #D8B7A6;
            --subtle-gold: #C6A75E;
            --white: #FFFFFF;
            --text-muted: rgba(31, 61, 43, 0.55);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-nude); color: var(--forest-green); line-height: 1.6; min-height: 100vh; }
        h1, h2, h3, h4 { font-family: 'Crimson Pro', serif; font-weight: 300; letter-spacing: -0.02em; }

        .announcement-bar { background: var(--forest-green); color: var(--bg-nude); padding: 12px 0; font-size: 13px; letter-spacing: 0.8px; font-weight: 500; overflow: hidden; }
        .announcement-track { display: flex; animation: scroll 25s linear infinite; white-space: nowrap; }
        .announcement-item { padding: 0 60px; display: inline-flex; align-items: center; gap: 10px; }
        .announcement-separator { width: 4px; height: 4px; background: var(--soft-blush); border-radius: 50%; opacity: 0.6; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .header { background: var(--bg-nude); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(31, 61, 43, 0.08); min-height: 80px; transition: box-shadow 0.3s ease; }
        .header.scrolled { box-shadow: 0 4px 20px rgba(31, 61, 43, 0.06); }
        .logo { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; text-decoration: none; color: var(--forest-green); transition: opacity 0.3s ease; }
        .logo:hover { opacity: 0.7; }
        .logo img { height: 65px; width: auto; display: block; }
        .logo-text { font-family: 'Crimson Pro', serif; font-size: 24px; font-weight: 400; letter-spacing: 0.5px; }
        .back-link { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--forest-green); font-size: 14px; font-weight: 500; transition: opacity 0.3s ease; z-index: 10; }
        .back-link:hover { opacity: 0.6; }
        .cart-icon { width: 24px; height: 24px; cursor: pointer; z-index: 10; stroke: var(--forest-green); transition: opacity 0.3s ease; }

        .page-hero { padding: 60px 20px 40px; text-align: center; }
        .page-hero h1 { font-size: clamp(42px, 8vw, 64px); line-height: 1.0; letter-spacing: -0.04em; font-weight: 300; margin-bottom: 12px; }
        .page-hero h1 em { font-style: italic; color: var(--soft-blush); }
        .page-hero p { font-size: 15px; color: var(--text-muted); }

        .cart-container { max-width: 700px; margin: 0 auto; padding: 0 20px 80px; }

        .cart-empty { text-align: center; padding: 60px 20px; }
        .cart-empty p { font-size: 16px; color: var(--text-muted); margin-bottom: 24px; }
        .cart-empty a { display: inline-block; background: var(--forest-green); color: var(--bg-nude); padding: 14px 36px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.3s ease; }
        .cart-empty a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(31, 61, 43, 0.18); }

        .cart-item { display: flex; gap: 16px; padding: 20px; background: var(--white); border-radius: 16px; margin-bottom: 12px; box-shadow: 0 1px 12px rgba(31, 61, 43, 0.05); }
        .cart-item-image { width: 80px; height: 80px; border-radius: 12px; background: var(--bg-nude); display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; overflow: hidden; }
        .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .cart-item-name { font-family: 'Crimson Pro', serif; font-size: 20px; font-weight: 400; margin-bottom: 2px; }
        .cart-item-price { font-size: 15px; font-weight: 600; color: var(--forest-green); }
        .cart-item-actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .qty-btn { width: 30px; height: 30px; border: 1.5px solid rgba(31,61,43,0.15); border-radius: 8px; background: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--forest-green); transition: all 0.2s; }
        .qty-btn:hover { border-color: var(--forest-green); background: rgba(31,61,43,0.04); }
        .qty-value { font-size: 15px; font-weight: 600; min-width: 20px; text-align: center; }
        .remove-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: color 0.2s; }
        .remove-btn:hover { color: #c0392b; }

        .cart-summary { background: var(--white); border-radius: 16px; padding: 24px; margin-top: 20px; box-shadow: 0 1px 12px rgba(31, 61, 43, 0.05); }
        .cart-summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
        .cart-summary-row.total { border-top: 1.5px solid rgba(31,61,43,0.1); margin-top: 8px; padding-top: 16px; font-size: 18px; font-weight: 600; }
        .btn-checkout { display: block; width: 100%; background: var(--forest-green); color: var(--bg-nude); padding: 16px; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.3s ease; text-align: center; text-decoration: none; }
        .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(31, 61, 43, 0.18); }
        .btn-continue { display: block; text-align: center; margin-top: 14px; color: var(--text-muted); font-size: 14px; text-decoration: none; transition: color 0.2s; }
        .btn-continue:hover { color: var(--forest-green); }

        .footer { background: var(--forest-green); color: var(--bg-nude); padding: 40px 20px; text-align: center; }
        .footer-inner { max-width: 620px; margin: 0 auto; }
        .footer-logo-text { font-family: 'Crimson Pro', serif; font-size: 20px; font-weight: 300; margin-bottom: 12px; }
        .footer-mini-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; }
        .footer-mini-links a { color: rgba(239,230,221,0.7); text-decoration: none; font-size: 13px; transition: color 0.3s; }
        .footer-mini-links a:hover { color: var(--soft-blush); }
        .footer-copy { font-size: 12px; color: rgba(239,230,221,0.45); }

        @media (min-width: 768px) { .logo img { height: 75px; } }
    </style>
</head>
<body>
    <div class="announcement-bar">
        <div class="announcement-track">
            <span class="announcement-item">Directly Imported Korean Skincare</span>
            <span class="announcement-separator"></span>
            <span class="announcement-item">Authenticity Guaranteed</span>
            <span class="announcement-separator"></span>
            <span class="announcement-item">Ships from Cairo</span>
            <span class="announcement-separator"></span>
            <span class="announcement-item">Directly Imported Korean Skincare</span>
            <span class="announcement-separator"></span>
            <span class="announcement-item">Authenticity Guaranteed</span>
            <span class="announcement-separator"></span>
            <span class="announcement-item">Ships from Cairo</span>
            <span class="announcement-separator"></span>
        </div>
    </div>

    <header class="header">
        <a href="index.html" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            <span>Continue Shopping</span>
        </a>
        <a href="index.html" class="logo">
            <img src="beauvia-logo.png" alt="BEAUVIA&CO" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <span class="logo-text" style="display:none;">BEAUVIA&CO</span>
        </a>
        <div style="width:24px;"></div>
    </header>

    <div class="page-hero">
        <h1>Your <em>Bag</em></h1>
        <p id="cartSubtitle"></p>
    </div>

    <div class="cart-container" id="cartContainer">
        <!-- Cart items rendered here -->
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-logo-text">BEAUVIA&CO</p>
            <div class="footer-mini-links">
                <a href="index.html">Home</a>
                <a href="index.html#bestsellers">Shop</a>
                <a href="contact.html">Contact</a>
            </div>
            <p class="footer-copy">&copy; 2024 BEAUVIA&CO. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function getCart() { try { return JSON.parse(localStorage.getItem('beauvia_cart')) || []; } catch { return []; } }
        function saveCart(cart) { localStorage.setItem('beauvia_cart', JSON.stringify(cart)); }
        function escapeHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cartContainer');
            const subtitle = document.getElementById('cartSubtitle');

            if (!cart.length) {
                subtitle.textContent = 'Your bag is empty';
                container.innerHTML = `<div class="cart-empty"><p>You haven't added any products yet.</p><a href="index.html#bestsellers">Browse Products</a></div>`;
                return;
            }

            const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
            const totalPrice = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            subtitle.textContent = totalItems + ' item' + (totalItems !== 1 ? 's' : '') + ' in your bag';

            let html = '';
            cart.forEach((item, idx) => {
                html += `<div class="cart-item">
                    <div class="cart-item-image">${item.image ? '<img src="' + escapeHtml(item.image) + '" alt="">' : '\uD83E\uDDF4'}</div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${escapeHtml(item.name)}</div>
                        <div class="cart-item-price">${Number(item.price).toLocaleString()} EGP</div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="changeQty(${idx}, -1)">-</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
                            <button class="remove-btn" onclick="removeItem(${idx})">Remove</button>
                        </div>
                    </div>
                </div>`;
            });

            html += `<div class="cart-summary">
                <div class="cart-summary-row"><span>Subtotal</span><span>${totalPrice.toLocaleString()} EGP</span></div>
                <div class="cart-summary-row"><span>Shipping</span><span style="color:var(--text-muted);">Calculated at checkout</span></div>
                <div class="cart-summary-row total"><span>Total</span><span>${totalPrice.toLocaleString()} EGP</span></div>
            </div>
            <a href="checkout.html" class="btn-checkout">Proceed to Checkout</a>
            <a href="index.html#bestsellers" class="btn-continue">Continue Shopping</a>`;

            container.innerHTML = html;
        }

        function changeQty(idx, delta) {
            const cart = getCart();
            if (!cart[idx]) return;
            cart[idx].quantity += delta;
            if (cart[idx].quantity < 1) cart.splice(idx, 1);
            saveCart(cart);
            renderCart();
        }

        function removeItem(idx) {
            const cart = getCart();
            cart.splice(idx, 1);
            saveCart(cart);
            renderCart();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
        window.addEventListener('scroll', () => { document.querySelector('.header').classList.toggle('scrolled', window.pageYOffset > 50); });
    </script>
</body>
</html>
